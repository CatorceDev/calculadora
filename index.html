<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="ZeFcwP3j5qMkV4s-yLVzA3xLw7OHQi1bXKR91sPKduE" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Haz operaciones matematicas con esta calculadora creada con HTML, CSS y JS">
    <link rel="icon" href="/assets/logo.jpg">
    <title>Calculadora</title>

    <link rel="stylesheet" href="/style.css">

    <script src="script.js" defer></script>
</head>
<body>
    <div class="calculadora-container">
        <div class="calculadora-results">
            
        </div>
        <div class="calculadora-controllers">
            <button class="controller-element element-c">C</button>
            <button class="controller-element element-delete">Borrar</button>
            <button class="controller-element element-divide">Dividir</button>
            <button class="controller-element element-number element-7" data-num="7">7</button>
            <button class="controller-element element-number element-8" data-num="8">8</button>
            <button class="controller-element element-number element-9" data-num="9">9</button>
            <button class="controller-element element-multiplicate">x</button>
            <button class="controller-element element-number element-4" data-num="4">4</button>
            <button class="controller-element element-number element-5" data-num="5">5</button>
            <button class="controller-element element-number element-6" data-num="6">6</button>
            <button class="controller-element element-rest">-</button>
            <button class="controller-element element-number element-1" data-num="1">1</button>
            <button class="controller-element element-number element-2" data-num="2">2</button>
            <button class="controller-element element-number element-3" data-num="3">3</button>
            <button class="controller-element element-sum">+</button>
            <button class="controller-element element-number element-0" data-num="0">0</button>
            <button class="controller-element element-equal">=</button>
        </div>
    </div>
</body>
</html>
